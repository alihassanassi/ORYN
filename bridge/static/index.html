<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>JARVIS — NEURAL MAP</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html,body { width:100%; height:100%; overflow:hidden; background:#00000c; }
canvas { display:block; position:fixed; top:0; left:0; touch-action:none; }
body::after {
  content:''; position:fixed; inset:0; pointer-events:none; z-index:5;
  background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,0.03) 3px,rgba(0,0,0,0.03) 4px);
}
.corner { position:fixed; width:16px; height:16px; z-index:20; pointer-events:none; }
.corner::before,.corner::after { content:''; position:absolute; background:rgba(0,188,158,0.4); }
.corner::before { width:100%; height:1px; }
.corner::after  { width:1px; height:100%; }
#c-tl{top:8px;left:8px} #c-tr{top:8px;right:8px;transform:scaleX(-1)}
#c-bl{bottom:8px;left:8px;transform:scaleY(-1)} #c-br{bottom:8px;right:8px;transform:scale(-1)}
#hud-top {
  position:fixed; top:0; left:0; right:0; height:44px; z-index:20;
  background:linear-gradient(180deg,rgba(0,0,12,0.98) 0%,transparent 100%);
  border-bottom:1px solid rgba(0,188,158,0.08);
  display:flex; align-items:center; padding:0 20px; gap:14px;
}
#hud-title {
  font-family:'Courier New',monospace; font-size:10px; letter-spacing:8px;
  color:rgba(0,188,158,0.95);
  text-shadow:0 0 18px rgba(0,188,158,0.6),0 0 36px rgba(0,188,158,0.18);
}
.hud-div { width:1px; height:14px; background:rgba(0,188,158,0.15); flex-shrink:0; }
#hud-status { font-family:'Courier New',monospace; font-size:7px; letter-spacing:2px; color:rgba(0,188,158,0.45); }
#hud-clock  { font-family:'Courier New',monospace; font-size:9px; letter-spacing:5px; color:rgba(0,188,158,0.55); }
#mode-btn {
  background:transparent; border:1px solid rgba(0,188,158,0.22); border-radius:2px;
  color:rgba(0,188,158,0.72); font-family:'Courier New',monospace; font-size:7px;
  letter-spacing:2px; padding:4px 11px; cursor:pointer; transition:all 0.2s;
}
#mode-btn:hover { border-color:rgba(0,188,158,0.55); color:rgba(0,188,158,1); background:rgba(0,188,158,0.06); }
#ws-dot { width:5px; height:5px; border-radius:50%; background:rgba(255,255,255,0.12); flex-shrink:0; transition:background 0.6s,box-shadow 0.6s; }
#ws-dot.live { background:#00bc9e; box-shadow:0 0 8px rgba(0,188,158,0.8); }
#hud-spacer { flex:1; }
#gear-btn {
  background:transparent; border:none; color:rgba(0,188,158,0.4);
  font-size:13px; cursor:pointer; padding:4px 2px; line-height:1;
  transition:color 0.2s; flex-shrink:0;
}
#gear-btn:hover { color:rgba(0,188,158,0.92); }
#settings-panel {
  position:fixed; top:44px; right:0; background:rgba(0,0,12,0.97);
  border:1px solid rgba(0,188,158,0.18); border-top:none; border-right:none;
  padding:16px 20px; z-index:25; display:none; min-width:230px;
  box-shadow:-8px 8px 30px rgba(0,0,0,0.6);
}
.sp-title { font-family:'Courier New',monospace; font-size:7px; letter-spacing:4px;
  color:rgba(0,188,158,0.35); margin-bottom:14px; }
.sp-row { display:flex; align-items:center; gap:10px; margin-bottom:10px; }
.sp-label { font-family:'Courier New',monospace; font-size:8px; letter-spacing:1.5px;
  color:rgba(0,188,158,0.65); min-width:80px; }
input[type=range] {
  flex:1; accent-color:#00bc9e; cursor:pointer; height:2px;
  background:rgba(0,188,158,0.15); border-radius:1px; outline:none; border:none;
}
.sp-val { font-family:'Courier New',monospace; font-size:8px; color:rgba(0,188,158,0.45); min-width:32px; text-align:right; }
#tooltip {
  position:fixed; background:rgba(0,0,12,0.97); border:1px solid rgba(0,188,158,0.3);
  border-radius:2px; padding:9px 13px; font-family:'Courier New',monospace;
  font-size:8px; color:rgba(0,188,158,0.88); letter-spacing:1px;
  pointer-events:none; display:none; z-index:30; max-width:195px; line-height:1.75;
  box-shadow:0 0 20px rgba(0,188,158,0.08);
}
.tt-type { font-size:6px; letter-spacing:3px; opacity:0.4; margin-bottom:3px; }
.tt-name { font-size:9px; letter-spacing:1.5px; margin-bottom:4px; }
.tt-meta { font-size:7.5px; opacity:0.55; }
#chat-bar {
  position:fixed; bottom:0; left:0; right:0; padding:8px 14px;
  background:rgba(0,0,12,0.94); border-top:1px solid rgba(0,188,158,0.1);
  display:flex; gap:8px; z-index:20; backdrop-filter:blur(10px);
}
#chat-input {
  flex:1; background:rgba(0,188,158,0.03); border:1px solid rgba(0,188,158,0.18);
  border-radius:2px; color:rgba(0,188,158,0.92); font-family:'Courier New',monospace;
  font-size:10px; padding:6px 11px; outline:none; letter-spacing:0.5px; transition:border-color 0.2s;
}
#chat-input:focus { border-color:rgba(0,188,158,0.4); }
#chat-input::placeholder { color:rgba(0,188,158,0.2); letter-spacing:1px; }
#send-btn {
  background:rgba(0,188,158,0.06); border:1px solid rgba(0,188,158,0.25); border-radius:2px;
  color:rgba(0,188,158,0.8); font-family:'Courier New',monospace; font-size:7px;
  letter-spacing:2px; padding:0 13px; cursor:pointer; transition:all 0.2s;
}
#send-btn:hover { background:rgba(0,188,158,0.12); border-color:rgba(0,188,158,0.5); color:rgba(0,188,158,1); }
#chat-log { position:fixed; bottom:44px; left:0; right:0; padding:0 14px 5px; z-index:19; pointer-events:none; }
.chat-line { font-family:'Courier New',monospace; font-size:8.5px; letter-spacing:0.5px; line-height:1.6; padding:1px 0; transition:opacity 1s; color:rgba(0,188,158,0.65); }
.chat-line.user { color:rgba(0,188,158,0.42); }
.chat-line.fading { opacity:0; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="corner" id="c-tl"></div><div class="corner" id="c-tr"></div>
<div class="corner" id="c-bl"></div><div class="corner" id="c-br"></div>
<div id="hud-top">
  <span id="hud-title">J&middot;A&middot;R&middot;V&middot;I&middot;S</span>
  <div class="hud-div"></div>
  <span id="hud-status">NODES: 0 | EDGES: 0 | FINDINGS: 0 | ONLINE</span>
  <div class="hud-div"></div>
  <button id="mode-btn" onclick="toggleMode()">RECON MAP</button>
  <div id="ws-dot"></div>
  <div id="hud-spacer"></div>
  <span id="hud-clock">00:00:00</span>
  <button id="gear-btn" onclick="toggleSettings()" title="Settings">⚙</button>
</div>
<div id="settings-panel">
  <div class="sp-title">DISPLAY SETTINGS</div>
  <div class="sp-row">
    <span class="sp-label">BRIGHTNESS</span>
    <input type="range" id="bright-slider" min="0.3" max="2.5" step="0.05" value="1.0">
    <span class="sp-val" id="bright-val">1.0×</span>
  </div>
</div>
<div id="tooltip">
  <div class="tt-type" id="tt-type"></div>
  <div class="tt-name" id="tt-name"></div>
  <div class="tt-meta" id="tt-meta"></div>
</div>
<div id="chat-log"></div>
<div id="chat-bar">
  <input id="chat-input" type="text" placeholder="TRANSMIT TO JARVIS..." autocomplete="off" spellcheck="false">
  <button id="send-btn" onclick="sendChat()">SEND</button>
</div>
<script>
// ── Canvas ─────────────────────────────────────────────────────────────────────
const cv=document.getElementById('c'), cx=cv.getContext('2d');
function resize(){
  const w=window.innerWidth||document.documentElement.clientWidth||800;
  const h=window.innerHeight||document.documentElement.clientHeight||600;
  if(w>0&&h>0){ cv.width=w; cv.height=h; }
}
resize(); window.addEventListener('resize',resize);

// ── Palette ────────────────────────────────────────────────────────────────────
const P={
  bg:'#00000c',
  core:'#00bc9e', brain:'#3d7a9a', sense:'#2a6488',
  safety:'#7a4f38', ops:'#2e6070', infra:'#1e3e52',
  PROGRAM:'#00bc9e', DOMAIN:'#2e6888', SUBDOMAIN:'#1e4860',
  FINDING:'#7a3828', IP:'#3a2e6a', SERVICE:'#1e4840',
};
const NCFG={
  core:{c:P.core,s:18},  brain:{c:P.brain,s:10}, sense:{c:P.sense,s:9},
  safety:{c:P.safety,s:10}, ops:{c:P.ops,s:9},   infra:{c:P.infra,s:8},
  PROGRAM:{c:P.PROGRAM,s:15}, DOMAIN:{c:P.DOMAIN,s:10}, SUBDOMAIN:{c:P.SUBDOMAIN,s:7},
  FINDING:{c:P.FINDING,s:11}, IP:{c:P.IP,s:7},   SERVICE:{c:P.SERVICE,s:6},
  program:{c:P.PROGRAM,s:15}, domain:{c:P.DOMAIN,s:10}, subdomain:{c:P.SUBDOMAIN,s:7},
  finding:{c:P.FINDING,s:11}, ip:{c:P.IP,s:7},   service:{c:P.SERVICE,s:6},
};

// ── State ─────────────────────────────────────────────────────────────────────
const S={
  nodes:[],edges:[],particles:[],stars:[],phantoms:[],
  rotX:0.18,rotY:0.28,velX:0,velY:0,zoom:1.0,
  drag:false,lmx:0,lmy:0,mx:0,my:0,
  hovered:null,mode:'neural',t:0,autoRot:true,ws:null,phTimer:0,
};

// ── Neural map ────────────────────────────────────────────────────────────────
const NN=[
  {id:'core',    label:'JARVIS CORE',    type:'core',  desc:'Central intelligence'},
  {id:'llm',     label:'LLM ROUTER',     type:'brain', desc:'qwen3:14b + phi4-mini'},
  {id:'memory',  label:'MEMORY STORE',   type:'brain', desc:'6-layer persistent memory'},
  {id:'improve', label:'SELF-IMPROVER',  type:'brain', desc:'Behavioral self-review'},
  {id:'voice',   label:'VOICE STACK',    type:'sense', desc:'Chatterbox + Kokoro TTS'},
  {id:'stt',     label:'STT ENGINE',     type:'sense', desc:'Whisper + wake word'},
  {id:'policy',  label:'POLICY GATE',    type:'safety',desc:'All actions gated here'},
  {id:'kill',    label:'KILL SWITCH',    type:'safety',desc:'Ctrl+Alt+Shift+K'},
  {id:'audit',   label:'AUDIT LOG',      type:'safety',desc:'Hash-chained immutable'},
  {id:'scope',   label:'SCOPE CHECKER',  type:'safety',desc:'Fails closed on error'},
  {id:'recon',   label:'RECON ENGINE',   type:'ops',   desc:'subfinder\u2192httpx\u2192nuclei'},
  {id:'research',label:'RESEARCH ENGINE',type:'ops',   desc:'NVD + CVE correlation'},
  {id:'strategy',label:'STRATEGY ENGINE',type:'ops',   desc:'Hunt director'},
  {id:'finding', label:'FINDING ENGINE', type:'ops',   desc:'CVSS + H1 report'},
  {id:'bridge',  label:'BRIDGE SERVER',  type:'ops',   desc:'FastAPI 0.0.0.0:5000'},
  {id:'boot',    label:'BOOT MANAGER',   type:'infra', desc:'16-step boot sequence'},
  {id:'jobs',    label:'JOB EXECUTOR',   type:'infra', desc:'Scheduler + pipelines'},
];
const NE=[
  ['core','llm'],['core','memory'],['core','voice'],['core','policy'],
  ['core','recon'],['core','research'],['core','strategy'],
  ['llm','memory'],['llm','policy'],['llm','improve'],
  ['policy','kill'],['policy','audit'],['policy','scope'],
  ['scope','recon'],['scope','bridge'],
  ['recon','bridge'],['recon','finding'],
  ['bridge','jobs'],['bridge','research'],
  ['boot','core'],['boot','memory'],
  ['jobs','recon'],['strategy','finding'],
  ['voice','stt'],['finding','audit'],['memory','improve'],
];

// ── Fibonacci sphere ───────────────────────────────────────────────────────────
function fib(i,n,r){
  const ph=Math.acos(1-2*(i+0.5)/n), th=Math.PI*(1+Math.sqrt(5))*(i+0.5);
  return {x:r*Math.sin(ph)*Math.cos(th), y:r*Math.cos(ph), z:r*Math.sin(ph)*Math.sin(th)};
}

function initNeural(){
  const n=NN.length;
  NN.forEach((nd,i)=>{
    const cfg=NCFG[nd.type]||NCFG.ops;
    nd.color=cfg.c; nd.size=cfg.s;
    if(nd.id==='core'){nd.x=0;nd.y=0;nd.z=0;return;}
    const p=fib(i,n,230); nd.x=p.x;nd.y=p.y;nd.z=p.z;
  });
  S.nodes=NN.slice();
  S.edges=NE.map(([a,b])=>({a,b,src:NN.find(n=>n.id===a),dst:NN.find(n=>n.id===b)})).filter(e=>e.src&&e.dst);
  initPart();
}

function initPart(){
  S.particles=[];
  S.edges.forEach(e=>{
    // One particle per edge — enough for visual richness without perf cost
    S.particles.push({edge:e,t:Math.random(),sp:0.0015+Math.random()*0.002});
  });
}

function initStars(){
  S.stars=[];
  // Three shells — counts tuned for smooth 60fps
  [[170,780,0.25,0.7,0.12,0.35],[65,950,0.4,1.1,0.18,0.45],[25,1100,0.55,1.4,0.25,0.55]]
  .forEach(([n,r,sn,sx,an,ax])=>{
    for(let i=0;i<n;i++){
      const p=fib(i+Math.random()*40,n,r+Math.random()*120);
      S.stars.push({x:p.x,y:p.y,z:p.z, size:sn+Math.random()*(sx-sn), alpha:an+Math.random()*(ax-an)});
    }
  });
}

// ── 3D math ───────────────────────────────────────────────────────────────────
function rot(x,y,z){
  const cx2=Math.cos(S.rotX),sx=Math.sin(S.rotX),cy=Math.cos(S.rotY),sy=Math.sin(S.rotY);
  const x1=x*cy+z*sy, z1=-x*sy+z*cy;
  return {x:x1, y:y*cx2-z1*sx, z:y*sx+z1*cx2};
}
function proj(x,y,z){
  const W=cv.width,H=cv.height;
  const cam=820/S.zoom, dz=cam+z;
  if(dz<40) return null;
  const f=570/dz;
  return {sx:W/2+x*f, sy:H/2+y*f, sc:f, z};
}
function ha(hex,a){
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${Math.min(1,a).toFixed(3)})`;
}

// ── Draw ───────────────────────────────────────────────────────────────────────
function drawNode(nd,pp,hov){
  if(!pp) return;
  const col=nd.color||P.ops, base=(nd.size||9)*pp.sc, m=hov?2.6:1.0;
  const zd=Math.max(0.08,Math.min(1,(pp.z+300)/600));

  // Corona glow
  const cg=cx.createRadialGradient(pp.sx,pp.sy,0,pp.sx,pp.sy,base*3*m);
  cg.addColorStop(0,ha(col,0.25*zd*m)); cg.addColorStop(1,ha(col,0));
  cx.beginPath();cx.arc(pp.sx,pp.sy,base*3*m,0,Math.PI*2);cx.fillStyle=cg;cx.fill();

  // Core sphere
  const sg=cx.createRadialGradient(pp.sx-base*0.3,pp.sy-base*0.3,0,pp.sx,pp.sy,base*m);
  sg.addColorStop(0,`rgba(255,255,255,${(0.72*zd).toFixed(3)})`);
  sg.addColorStop(0.35,ha(col,Math.min(1,zd))); sg.addColorStop(1,ha(col,0.65*zd));
  cx.beginPath();cx.arc(pp.sx,pp.sy,base*m,0,Math.PI*2);cx.fillStyle=sg;cx.fill();

  // Pulse ring on core and safety nodes
  if(nd.type==='core'||nd.type==='safety'){
    const pulse=1+0.12*Math.sin(S.t*0.035);
    cx.beginPath();cx.arc(pp.sx,pp.sy,base*2.2*pulse,0,Math.PI*2);
    cx.strokeStyle=ha(col,0.28*zd);cx.lineWidth=0.8;cx.stroke();
  }

  // Label
  const la=hov?0.95:Math.max(0,zd*0.85-0.05);
  if(la>0.06){
    const fs=Math.max(7,Math.round(7*pp.sc+5));
    cx.globalAlpha=la;
    cx.font=`${fs}px 'Courier New',monospace`;
    cx.fillStyle=col;cx.textAlign='center';
    cx.fillText(nd.label||nd.id,pp.sx,pp.sy+base*m+11);
    cx.globalAlpha=1;
  }
}

function drawEdge(e){
  const {src,dst}=e; if(!src||!dst) return;
  const sr=rot(src.x,src.y,src.z),dr=rot(dst.x,dst.y,dst.z);
  const sp=proj(sr.x,sr.y,sr.z),dp=proj(dr.x,dr.y,dr.z);
  if(!sp||!dp) return;
  let a=0.18;
  if(src.type==='safety'||dst.type==='safety'||src.type==='FINDING'||dst.type==='FINDING'||
     src.type==='finding'||dst.type==='finding')
    a=0.30+0.12*Math.sin(S.t*0.06);
  cx.beginPath();cx.moveTo(sp.sx,sp.sy);cx.lineTo(dp.sx,dp.sy);
  cx.strokeStyle=`rgba(0,188,158,${a.toFixed(3)})`;cx.lineWidth=0.6;cx.stroke();
}

function drawPart(p){
  const {src,dst}=p.edge; if(!src||!dst) return;
  p.t+=p.sp; if(p.t>1)p.t-=1;
  const rx=src.x+(dst.x-src.x)*p.t, ry=src.y+(dst.y-src.y)*p.t, rz=src.z+(dst.z-src.z)*p.t;
  const r=rot(rx,ry,rz), pp=proj(r.x,r.y,r.z); if(!pp) return;
  const col=p.t<0.5?(src.color||P.ops):(dst.color||P.ops);
  const zd=Math.max(0,( pp.z+300)/600); if(zd<0.05) return;
  const sz=1.4*pp.sc;
  const g=cx.createRadialGradient(pp.sx,pp.sy,0,pp.sx,pp.sy,sz*3);
  g.addColorStop(0,ha(col,0.88*zd));g.addColorStop(1,ha(col,0));
  cx.beginPath();cx.arc(pp.sx,pp.sy,sz*3,0,Math.PI*2);cx.fillStyle=g;cx.fill();
  cx.beginPath();cx.arc(pp.sx,pp.sy,sz,0,Math.PI*2);cx.fillStyle=ha(col,Math.min(1,zd));cx.fill();
}

function drawPhantoms(){
  S.phTimer++;
  // Slower spawn + hard cap — keeps phantom count low for smooth frames
  if(S.phTimer>=120&&S.nodes.length>0&&S.phantoms.length<18){
    S.phTimer=0;
    const p=S.nodes[Math.floor(Math.random()*S.nodes.length)];
    const j=40+Math.random()*65,a=Math.random()*Math.PI*2,v=(Math.random()-0.5)*Math.PI;
    S.phantoms.push({x:p.x+j*Math.cos(a)*Math.cos(v),y:p.y+j*Math.sin(v),z:p.z+j*Math.sin(a)*Math.cos(v),
      color:p.color||P.ops,life:0,max:90+Math.floor(Math.random()*90),size:1.2+Math.random()*2.2});
  }
  for(let i=S.phantoms.length-1;i>=0;i--){
    const ph=S.phantoms[i]; ph.life++;
    if(ph.life>=ph.max){S.phantoms.splice(i,1);continue;}
    const pr=ph.life/ph.max;
    let a=pr<0.2?pr/0.2:pr>0.7?(1-pr)/0.3:1.0; a*=0.55;
    const r=rot(ph.x,ph.y,ph.z),pp=proj(r.x,r.y,r.z); if(!pp) continue;
    if(pp.sx<-4||pp.sx>cv.width+4||pp.sy<-4||pp.sy>cv.height+4) continue;
    const sz=ph.size*pp.sc,zd=Math.max(0,(pp.z+300)/600); if(zd<0.05) continue;
    const g=cx.createRadialGradient(pp.sx,pp.sy,0,pp.sx,pp.sy,sz*3);
    g.addColorStop(0,ha(ph.color,a*zd));g.addColorStop(1,ha(ph.color,0));
    cx.beginPath();cx.arc(pp.sx,pp.sy,sz*3,0,Math.PI*2);cx.fillStyle=g;cx.fill();
    cx.beginPath();cx.arc(pp.sx,pp.sy,sz,0,Math.PI*2);cx.fillStyle=ha(ph.color,a*0.9*zd);cx.fill();
  }
}

function drawStars(){
  // Fast path: fillRect + globalAlpha, no arc/path construction per star
  cx.fillStyle='rgb(190,210,255)';
  S.stars.forEach(s=>{
    const r=rot(s.x,s.y,s.z),pp=proj(r.x,r.y,r.z); if(!pp) return;
    if(pp.sx<-2||pp.sx>cv.width+2||pp.sy<-2||pp.sy>cv.height+2) return;
    const zd=Math.max(0.1,Math.min(1,(pp.z+1300)/2200));
    cx.globalAlpha=Math.min(1,s.alpha*zd*1.9);
    const sz=s.size*Math.min(pp.sc*3.5,1.8);
    cx.fillRect(pp.sx-sz*0.5,pp.sy-sz*0.5,sz,sz);
  });
  cx.globalAlpha=1;
}

// ── Hover ─────────────────────────────────────────────────────────────────────
function detect(mx,my){
  let best=null,bd=38;
  S.nodes.forEach(nd=>{
    const r=rot(nd.x,nd.y,nd.z),pp=proj(r.x,r.y,r.z); if(!pp) return;
    const d=Math.hypot(pp.sx-mx,pp.sy-my),hr=(nd.size||9)*pp.sc*1.9+7;
    if(d<hr&&d<bd){bd=d;best=nd;}
  });
  S.hovered=best;
}
function tip(nd,mx,my){
  const tt=document.getElementById('tooltip');
  if(!nd){tt.style.display='none';return;}
  document.getElementById('tt-type').textContent=(nd.type||'NODE').toUpperCase();
  document.getElementById('tt-name').textContent=nd.label||nd.id||'—';
  document.getElementById('tt-meta').textContent=nd.desc||nd.notes||nd.target||'';
  const W=window.innerWidth,H=window.innerHeight;
  let tx=mx+16,ty=my-10;
  if(tx+205>W)tx=mx-215; if(ty+85>H)ty=my-75;
  tt.style.left=tx+'px';tt.style.top=ty+'px';tt.style.display='block';
}

// ── HUD ───────────────────────────────────────────────────────────────────────
function hud(){
  const fc=S.nodes.filter(n=>(n.type||'').toUpperCase()==='FINDING'||(n.type||'')==='finding').length;
  document.getElementById('hud-status').textContent=
    `NODES: ${S.nodes.length}  |  EDGES: ${S.edges.length}  |  FINDINGS: ${fc}  |  ONLINE`;
  const d=new Date();
  document.getElementById('hud-clock').textContent=
    String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0')+':'+String(d.getSeconds()).padStart(2,'0');
}

// ── Render ────────────────────────────────────────────────────────────────────
function render(){
  if(cv.width<10||cv.height<10){ resize(); requestAnimationFrame(render); return; }
  const W=cv.width,H=cv.height; S.t++;

  if(!S.drag){
    if(S.autoRot) S.rotY+=0.00012;
    S.velX*=0.88; S.velY*=0.88;
    S.rotX+=S.velX; S.rotY+=S.velY;
    if(!S.autoRot&&Math.abs(S.velX)<0.00006&&Math.abs(S.velY)<0.00006) S.autoRot=true;
  }
  S.rotX=Math.max(-Math.PI*0.44,Math.min(Math.PI*0.44,S.rotX));

  cx.fillStyle=P.bg; cx.fillRect(0,0,W,H);

  // Center nebula pulse
  const neb=cx.createRadialGradient(W/2,H/2,0,W/2,H/2,W*0.28);
  neb.addColorStop(0,`rgba(0,40,32,${(0.10+0.03*Math.sin(S.t*0.012)).toFixed(4)})`);
  neb.addColorStop(1,'rgba(0,0,0,0)');
  cx.fillStyle=neb; cx.fillRect(0,0,W,H);

  drawStars();

  const sorted=S.nodes.map(nd=>{const r=rot(nd.x,nd.y,nd.z);return{nd,pp:proj(r.x,r.y,r.z),rz:r.z};})
    .sort((a,b)=>a.rz-b.rz);

  S.edges.forEach(drawEdge);
  S.particles.forEach(drawPart);
  drawPhantoms();
  sorted.forEach(({nd,pp})=>drawNode(nd,pp,S.hovered===nd));

  // Bottom fade
  const fade=cx.createLinearGradient(0,H-90,0,H);
  fade.addColorStop(0,'rgba(0,0,12,0)'); fade.addColorStop(1,'rgba(0,0,12,0.55)');
  cx.fillStyle=fade; cx.fillRect(0,H-90,W,90);

  if(S.hovered) tip(S.hovered,S.mx,S.my);
  else document.getElementById('tooltip').style.display='none';
  if(S.t%60===0) hud();
  requestAnimationFrame(render);
}

// ── Input ─────────────────────────────────────────────────────────────────────
cv.addEventListener('mousedown',e=>{S.drag=true;S.autoRot=false;S.lmx=e.clientX;S.lmy=e.clientY;});
cv.addEventListener('mousemove',e=>{
  S.mx=e.clientX;S.my=e.clientY;
  if(S.drag){
    const dx=e.clientX-S.lmx,dy=e.clientY-S.lmy;
    S.velY=dx*0.005;S.velX=dy*0.005;
    S.rotY+=S.velY;S.rotX+=S.velX;
    S.lmx=e.clientX;S.lmy=e.clientY;
  }
  detect(e.clientX,e.clientY);
  if(!S.hovered) document.getElementById('tooltip').style.display='none';
});
document.addEventListener('mouseup',()=>S.drag=false);
cv.addEventListener('wheel',e=>{
  e.preventDefault();
  S.zoom=Math.max(0.28,Math.min(3.8,S.zoom-e.deltaY*0.0007));
},{passive:false});
cv.addEventListener('dblclick',()=>{S.rotX=0.18;S.rotY=0.28;S.zoom=1.0;S.velX=0;S.velY=0;S.autoRot=true;});

let _pd=null,_lt=0;
cv.addEventListener('touchstart',e=>{
  e.preventDefault();
  if(e.touches.length===1){S.drag=true;S.autoRot=false;S.lmx=e.touches[0].clientX;S.lmy=e.touches[0].clientY;}
  if(e.touches.length===2)_pd=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
},{passive:false});
cv.addEventListener('touchmove',e=>{
  e.preventDefault();
  if(e.touches.length===1&&S.drag){
    const dx=e.touches[0].clientX-S.lmx,dy=e.touches[0].clientY-S.lmy;
    S.velY=dx*0.007;S.velX=dy*0.007;S.rotY+=S.velY;S.rotX+=S.velX;
    S.lmx=e.touches[0].clientX;S.lmy=e.touches[0].clientY;
  }
  if(e.touches.length===2&&_pd!==null){
    const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
    S.zoom=Math.max(0.28,Math.min(3.8,S.zoom+(d-_pd)*0.003));_pd=d;
  }
},{passive:false});
cv.addEventListener('touchend',e=>{
  S.drag=false;_pd=null;
  const now=Date.now();
  if(now-_lt<280){S.rotX=0.18;S.rotY=0.28;S.zoom=1.0;S.velX=0;S.velY=0;S.autoRot=true;}
  _lt=now;
});

// ── WebSocket ─────────────────────────────────────────────────────────────────
function wsConnect(){
  try{
    const proto=location.protocol==='https:'?'wss':'ws';
    const ws=new WebSocket(`${proto}://${location.host}/ws`);
    S.ws=ws;
    ws.onopen=()=>{ const d=document.getElementById('ws-dot'); if(d) d.classList.add('live'); };
    ws.onmessage=e=>{
      try{
        const d=JSON.parse(e.data);
        if(d.type==='ops_update'&&S.mode==='recon') loadRecon(d.payload);
        if(d.reply||d.content) addLine('assistant',d.reply||d.content);
      }catch(_){}
    };
    ws.onclose=()=>{ const d=document.getElementById('ws-dot'); if(d) d.classList.remove('live'); setTimeout(wsConnect,3000); };
    ws.onerror=()=>{};
  }catch(_){}
}

// ── Recon data ────────────────────────────────────────────────────────────────
function loadRecon(data){
  if(!data) return;
  const nodes=[],edges=[],seen={};let idx=0;
  function add(id,label,type,meta){
    if(seen[id]) return seen[id];
    const k=type.toUpperCase(),cfg=NCFG[k]||NCFG[type]||NCFG.ops||{c:P.ops,s:8};
    const p=fib(idx++,Math.max((data.nodes||[]).length,20),190);
    const nd={id,label,type,color:cfg.c,size:cfg.s,x:p.x,y:p.y,z:p.z,...meta};
    nodes.push(nd);seen[id]=nd;return nd;
  }
  (data.nodes||[]).forEach(n=>add(n.id||n.name,n.label||n.name||n.id,n.type||n.node_type||'SERVICE',n));
  (data.edges||[]).forEach(e=>{const s=seen[e.source||e.src],d=seen[e.target||e.dst];if(s&&d)edges.push({a:s.id,b:d.id,src:s,dst:d});});
  S.nodes=nodes;S.edges=edges;initPart();hud();
}

// ── Mode toggle ───────────────────────────────────────────────────────────────
function toggleMode(){
  if(S.mode==='neural'){
    S.mode='recon';
    document.getElementById('mode-btn').textContent='NEURAL MAP';
    document.getElementById('hud-status').textContent='LOADING RECON DATA...';
    fetch('/api/ops/graph')
      .then(r=>r.ok?r.json():null)
      .then(d=>{
        if(d&&(d.nodes||[]).length>0){ loadRecon(d); }
        else {
          // No recon data yet — show empty state in neural mode
          document.getElementById('hud-status').textContent='NO RECON DATA — ADD TARGETS FIRST';
          setTimeout(()=>{ S.mode='neural'; document.getElementById('mode-btn').textContent='RECON MAP'; initNeural(); },2000);
        }
      })
      .catch(()=>{
        document.getElementById('hud-status').textContent='BRIDGE OFFLINE';
        setTimeout(()=>{ S.mode='neural'; document.getElementById('mode-btn').textContent='RECON MAP'; initNeural(); },2000);
      });
  } else {
    S.mode='neural';
    document.getElementById('mode-btn').textContent='RECON MAP';
    initNeural();
  }
}

// ── Settings ──────────────────────────────────────────────────────────────────
function toggleSettings(){
  const p=document.getElementById('settings-panel');
  p.style.display=p.style.display==='block'?'none':'block';
}
document.getElementById('bright-slider').addEventListener('input',function(){
  const v=parseFloat(this.value);
  document.getElementById('bright-val').textContent=v.toFixed(1)+'×';
  document.body.style.filter=Math.abs(v-1.0)<0.01?'':'brightness('+v+')';
});
// Close settings when clicking outside
document.addEventListener('click',e=>{
  const panel=document.getElementById('settings-panel');
  const gear=document.getElementById('gear-btn');
  if(panel.style.display==='block'&&!panel.contains(e.target)&&e.target!==gear){
    panel.style.display='none';
  }
});

// ── Chat ──────────────────────────────────────────────────────────────────────
const _cl=[];
function addLine(role,text){
  const log=document.getElementById('chat-log');
  const div=document.createElement('div');
  div.className='chat-line '+role;
  div.textContent=(role==='user'?'> ':'J: ')+text.slice(0,180);
  log.appendChild(div);_cl.push({div});
  if(_cl.length>3){const o=_cl.shift();o.div.classList.add('fading');setTimeout(()=>{try{log.removeChild(o.div);}catch(_){}},1000);}
}
function sendChat(){
  const inp=document.getElementById('chat-input'),text=inp.value.trim();
  if(!text) return; inp.value=''; addLine('user',text);
  const pl=JSON.stringify({type:'chat',text,content:text});
  if(S.ws&&S.ws.readyState===1) S.ws.send(pl);
  else fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text,message:text})})
    .then(r=>r.ok?r.json():null).then(d=>{if(d&&(d.reply||d.response))addLine('assistant',d.reply||d.response);}).catch(()=>{});
}
document.getElementById('chat-input').addEventListener('keydown',e=>{if(e.key==='Enter')sendChat();});

// ── Boot ──────────────────────────────────────────────────────────────────────
function _boot(){
  resize();
  initStars(); initNeural(); hud(); render(); wsConnect();
  setInterval(()=>{
    if(S.mode==='recon')
      fetch('/api/ops/graph').then(r=>r.ok?r.json():null).then(d=>{if(d)loadRecon(d);}).catch(()=>{});
  },15000);
}
if(document.readyState==='loading'){
  document.addEventListener('DOMContentLoaded',_boot);
} else {
  _boot();
}
</script>
